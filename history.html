<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI History - Customizable Charts</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>📈</text></svg>">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        .header {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .nav-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .nav-link:hover { background: #f7fafc; }

        h1 { color: #2d3748; margin-bottom: 8px; font-size: 28px; }
        .subtitle { color: #718096; font-size: 14px; margin-bottom: 16px; }

        .controls { display: flex; gap: 12px; flex-wrap: wrap; }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) { background: #5568d3; transform: translateY(-1px); }
        button:disabled { background: #cbd5e0; cursor: not-allowed; }

        /* Chart Customization Panel */
        .customization-panel {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .customization-panel h3 {
            color: #2d3748;
            font-size: 16px;
            margin-bottom: 16px;
        }

        .customization-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 13px;
            font-weight: 600;
            color: #4a5568;
        }

        select, input[type="color"] {
            padding: 8px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Chart Section */
        .chart-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-title {
            font-size: 20px;
            font-weight: 700;
            color: #2d3748;
        }

        .time-buttons {
            display: flex;
            gap: 8px;
        }

        .time-btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid #e2e8f0;
            background: white;
            color: #4a5568;
            transition: all 0.2s;
        }

        .time-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .time-btn:hover { transform: translateY(-1px); }

        .chart-container {
            position: relative;
            height: 400px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .error {
            background: #fed7d7;
            color: #c53030;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .header-top { flex-direction: column; gap: 12px; }
            .nav-links { width: 100%; justify-content: center; }
            .controls { flex-direction: column; width: 100%; }
            button { width: 100%; }
            .customization-grid { grid-template-columns: 1fr; }
            .chart-container { height: 300px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-top">
                <h1>📈 AQI Historical Data</h1>
                <div class="nav-links">
                    <a href="index.html" class="nav-link">🏠 Home</a>
                    <a href="about.html" class="nav-link">ℹ️ About</a>
                </div>
            </div>
            <div class="subtitle">Track air quality trends over time</div>
            
            <div class="controls">
                <button id="locationBtn">📍 Use My Location</button>
                <button id="refreshBtn">🔄 Refresh Data</button>
            </div>
        </div>

        <!-- Chart Customization Panel -->
        <div id="customPanel" class="customization-panel" style="display: none;">
            <h3>🎨 Customize Your Chart</h3>
            <div class="customization-grid">
                <div class="control-group">
                    <label>Chart Type</label>
                    <select id="chartType" onchange="updateChart()">
                        <option value="line">Line Chart</option>
                        <option value="bar">Bar Chart</option>
                        <option value="area">Area Chart</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Line Color</label>
                    <input type="color" id="lineColor" value="#667eea" onchange="updateChart()">
                </div>
                <div class="control-group">
                    <label>Fill Opacity</label>
                    <select id="fillOpacity" onchange="updateChart()">
                        <option value="0">None</option>
                        <option value="0.1" selected>10%</option>
                        <option value="0.3">30%</option>
                        <option value="0.5">50%</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Grid Lines</label>
                    <select id="gridLines" onchange="updateChart()">
                        <option value="true" selected>Show</option>
                        <option value="false">Hide</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Animation</label>
                    <select id="animation" onchange="updateChart()">
                        <option value="true" selected>Enabled</option>
                        <option value="false">Disabled</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>Curve Style</label>
                    <select id="tension" onchange="updateChart()">
                        <option value="0">Sharp</option>
                        <option value="0.2">Slight</option>
                        <option value="0.4" selected>Smooth</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="statsGrid" class="stats-grid" style="display: none;"></div>

        <div id="chartSection" class="chart-section" style="display: none;">
            <div class="chart-header">
                <div class="chart-title">AQI Trend</div>
                <div class="time-buttons">
                    <button class="time-btn active" data-period="24h" onclick="changePeriod('24h')">24 Hours</button>
                    <button class="time-btn" data-period="7d" onclick="changePeriod('7d')">7 Days</button>
                    <button class="time-btn" data-period="30d" onclick="changePeriod('30d')">30 Days</button>
                </div>
            </div>
            <div class="chart-container">
                <canvas id="aqiChart"></canvas>
            </div>
        </div>

        <div id="error"></div>
        <div id="content" class="loading">Click "Use My Location" to view historical data</div>
    </div>

    <script>
        const API_URL = 'https://aqi-api-iqair-production.up.railway.app';
        let userLat, userLon;
        let currentChart = null;
        let currentPeriod = '24h';
        let historicalData = [];

        // Chart customization settings
        let chartSettings = {
            type: 'line',
            lineColor: '#667eea',
            fillOpacity: 0.1,
            gridLines: true,
            animation: true,
            tension: 0.4
        };

        // Get location button
        document.getElementById('locationBtn').onclick = async function() {
            const btn = this;
            btn.disabled = true;
            btn.textContent = '📍 Getting location...';

            try {
                const pos = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });

                userLat = pos.coords.latitude;
                userLon = pos.coords.longitude;
                await loadHistoricalData();

            } catch (error) {
                showError('Location access denied');
            } finally {
                btn.disabled = false;
                btn.textContent = '📍 Use My Location';
            }
        };

        // Refresh button
        document.getElementById('refreshBtn').onclick = async function() {
            if (userLat && userLon) {
                await loadHistoricalData();
            } else {
                showError('Please use your location first');
            }
        };

        // Change time period
        function changePeriod(period) {
            currentPeriod = period;
            
            document.querySelectorAll('.time-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.period === period) {
                    btn.classList.add('active');
                }
            });
            
            if (userLat && userLon) {
                loadHistoricalData();
            }
        }

        // Load historical data
        async function loadHistoricalData() {
            document.getElementById('content').className = 'loading';
            document.getElementById('content').innerHTML = 'Loading historical data...';

            try {
                // Get current data and record it
                const currentResponse = await fetch(`${API_URL}/api/aqi/nearby?lat=${userLat}&lon=${userLon}`);
                const currentData = await currentResponse.json();

                if (currentData.success && currentData.data.stations.length > 0) {
                    await recordReading(currentData.data.stations[0]);
                }

                // Get historical averages
                const days = currentPeriod === '24h' ? 1 : currentPeriod === '7d' ? 7 : 30;
                const period = currentPeriod === '24h' ? 'hour' : 'day';
                
                const historyResponse = await fetch(
                    `${API_URL}/api/history/averages?lat=${userLat}&lon=${userLon}&period=${period}&days=${days}`
                );
                const historyData = await historyResponse.json();

                if (historyData.success) {
                    historicalData = historyData.data.averages;
                    displayChart(historicalData);
                    await loadStats();
                    document.getElementById('content').innerHTML = '';
                    document.getElementById('customPanel').style.display = 'block';
                } else {
                    showError('No historical data available yet. Data will accumulate over time.');
                }

            } catch (error) {
                showError(error.message || 'Failed to load historical data');
            }
        }

        // Record a reading
        async function recordReading(station) {
            try {
                await fetch(`${API_URL}/api/history/record`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        location: {
                            name: station.name,
                            coordinates: station.coordinates,
                            city: station.city,
                            state: station.state,
                            country: station.country
                        },
                        source: station.source,
                        aqi: station.aqi,
                        pollutants: station.pollutants,
                        weather: station.weather
                    })
                });
            } catch (error) {
                console.error('Failed to record reading:', error);
            }
        }

        // Load statistics
        async function loadStats() {
            try {
                const days = currentPeriod === '24h' ? 1 : currentPeriod === '7d' ? 7 : 30;
                const response = await fetch(`${API_URL}/api/history/stats?lat=${userLat}&lon=${userLon}&days=${days}`);
                const data = await response.json();

                if (data.success && data.data.stats) {
                    displayStats(data.data.stats);
                }
            } catch (error) {
                console.error('Failed to load stats:', error);
            }
        }

        // Display statistics
        function displayStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${Math.round(stats.avgAQI)}</div>
                    <div class="stat-label">Average AQI</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Math.round(stats.minAQI)}</div>
                    <div class="stat-label">Best AQI</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${Math.round(stats.maxAQI)}</div>
                    <div class="stat-label">Worst AQI</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.totalReadings}</div>
                    <div class="stat-label">Data Points</div>
                </div>
            `;
            
            statsGrid.style.display = 'grid';
        }

        // Update chart with new settings
        function updateChart() {
            chartSettings.type = document.getElementById('chartType').value;
            chartSettings.lineColor = document.getElementById('lineColor').value;
            chartSettings.fillOpacity = parseFloat(document.getElementById('fillOpacity').value);
            chartSettings.gridLines = document.getElementById('gridLines').value === 'true';
            chartSettings.animation = document.getElementById('animation').value === 'true';
            chartSettings.tension = parseFloat(document.getElementById('tension').value);

            if (historicalData.length > 0) {
                displayChart(historicalData);
            }
        }

        // Display chart
        function displayChart(data) {
            const section = document.getElementById('chartSection');
            section.style.display = 'block';

            // Prepare data
            const labels = data.map(d => {
                const date = new Date(d._id.year, d._id.month - 1, d._id.day, d._id.hour || 0);
                return currentPeriod === '24h' 
                    ? date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    : date.toLocaleDateString([], { month: 'short', day: 'numeric' });
            });

            const aqiValues = data.map(d => Math.round(d.avgAQI));

            // Destroy existing chart
            if (currentChart) {
                currentChart.destroy();
            }

            // Determine chart type
            const chartType = chartSettings.type === 'area' ? 'line' : chartSettings.type;
            const fill = chartSettings.type === 'area' || chartSettings.fillOpacity > 0;

            // Create new chart
            const ctx = document.getElementById('aqiChart').getContext('2d');
            currentChart = new Chart(ctx, {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Average AQI',
                        data: aqiValues,
                        borderColor: chartSettings.lineColor,
                        backgroundColor: `${chartSettings.lineColor}${Math.round(chartSettings.fillOpacity * 255).toString(16).padStart(2, '0')}`,
                        borderWidth: 3,
                        tension: chartSettings.tension,
                        fill: fill,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        pointBackgroundColor: chartSettings.lineColor,
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: chartSettings.animation,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                font: { size: 14, weight: 'bold' },
                                color: '#2d3748'
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleFont: { size: 14, weight: 'bold' },
                            bodyFont: { size: 13 },
                            padding: 12,
                            cornerRadius: 8
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'AQI Level',
                                font: { size: 14, weight: 'bold' },
                                color: '#4a5568'
                            },
                            grid: {
                                display: chartSettings.gridLines,
                                color: 'rgba(0, 0, 0, 0.05)'
                            },
                            ticks: {
                                font: { size: 12 },
                                color: '#718096'
                            }
                        },
                        x: {
                            title: {
                                display: true,
                                text: currentPeriod === '24h' ? 'Time' : 'Date',
                                font: { size: 14, weight: 'bold' },
                                color: '#4a5568'
                            },
                            grid: {
                                display: false
                            },
                            ticks: {
                                font: { size: 12 },
                                color: '#718096'
                            }
                        }
                    }
                }
            });
        }

        // Show error
        function showError(msg) {
            document.getElementById('error').innerHTML = `<div class="error">❌ ${msg}</div>`;
            setTimeout(() => document.getElementById('error').innerHTML = '', 5000);
        }
    </script>
</body>
</html>
